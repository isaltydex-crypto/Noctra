# Noctra OS Calamares settings.
#
# Calamares loads viewmodules in `show` and job modules in `exec`.
# Keep this file conservative until the exact Calamares package version is pinned.

modules-search: [ local, /usr/lib/calamares/modules ]

instances:
  - id: services-systemd
    module: services-systemd
    config: services-systemd.conf
  - id: enable-privacy
    module: shellprocess
    config: shellprocess-enable-privacy.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - luksbootkeyfile
      - luksopenswaphookcfg
      - initcpiocfg
      - initcpio
      - users
      - displaymanager
      - services-systemd@services-systemd
      - shellprocess@enable-privacy
      - grubcfg
      - bootloader
      - umount
  - show:
      - finished

branding: noctra
prompt-install: true
dont-chroot: false
oem-setup: false

