# Ensure mkinitcpio can unlock encrypted root systems installed by Calamares.
#
# The exact hook ordering must be verified against the pinned Calamares and
# mkinitcpio versions during the first encrypted VM install.

extraFiles:
  - /crypto_keyfile.bin

hooks:
  - base
  - udev
  - autodetect
  - modconf
  - kms
  - keyboard
  - keymap
  - consolefont
  - block
  - encrypt
  - lvm2
  - filesystems
  - fsck

