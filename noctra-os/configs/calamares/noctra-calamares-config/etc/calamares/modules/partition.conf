# Noctra supports encrypted installs as the default path.
#
# Calamares module schemas vary between versions. Treat this as the Noctra
# policy baseline and validate it against the pinned package before ISO release.

efiSystemPartition: "/boot/efi"
efiSystemPartitionSize: 512MiB
efiSystemPartitionName: "EFI"
defaultFileSystemType: "btrfs"

availableFileSystemTypes:
  - "btrfs"
  - "ext4"

initialPartitioningChoice: erase
drawNestedPartitions: true
alwaysShowPartitionLabels: true

userSwapChoices:
  - none
  - file

defaultUserSwapChoice: none

encryptSystem: true
crypttabOptions: luks
luksGeneration: luks2

partitionLayout:
  - name: "Noctra ESP"
    filesystem: fat32
    mountPoint: "/boot/efi"
    size: 512MiB
    flags:
      - boot
      - esp
  - name: "Noctra Root"
    filesystem: btrfs
    mountPoint: "/"
    size: 100%
    encrypt: true

