insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod all_video
insmod font

if loadfont "${prefix}/fonts/unicode.pf2" ; then
    set gfxmode=auto
    terminal_input console
    terminal_output gfxterm
fi

set timeout=10
set default=0

menuentry "Noctra OS live environment (x86_64, UEFI)" --class noctra --class arch --class gnu-linux --class os {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry "Noctra OS live environment (safe graphics)" --class noctra --class arch --class gnu-linux --class os {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% nomodeset
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

if [ "${grub_platform}" = "efi" ]; then
    menuentry "UEFI Firmware Settings" {
        fwsetup
    }
fi

menuentry "Restart" {
    reboot
}

menuentry "Power Off" {
    halt
}
