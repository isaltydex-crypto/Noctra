# Minimal local-ISO initramfs for Noctra.
#
# Do not include Arch releng PXE/NBD/NFS hooks here unless the matching
# network-boot packages are also added to packages.x86_64. The first milestone
# only needs local ISO/USB boot.
HOOKS=(base udev microcode modconf kms archiso block filesystems keyboard)
COMPRESSION="xz"
COMPRESSION_OPTIONS=(-9e)
