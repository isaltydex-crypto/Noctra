#
# Noctra OS pacman configuration for ArchISO builds.
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# Add a signed Noctra package repository here once metapackages,
# Calamares, and optional themed packages are built.
#
# [noctra]
# SigLevel = Required DatabaseOptional
# Server = https://repo.noctra.example/$arch
